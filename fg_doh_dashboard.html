<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FG DOH Dashboard · Farmley</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b10;--bg2:#0d1117;--bg3:#131920;--bg4:#1a2230;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#dde3ee;--text2:#7a8899;--text3:#45535f;
  --accent:#38bdf8;
  --c-crit:#ef4444;--cb-crit:rgba(239,68,68,0.13);--cbr-crit:rgba(239,68,68,0.3);
  --c-low:#f97316;--cb-low:rgba(249,115,22,0.13);--cbr-low:rgba(249,115,22,0.3);
  --c-watch:#eab308;--cb-watch:rgba(234,179,8,0.13);--cbr-watch:rgba(234,179,8,0.3);
  --c-healthy:#22c55e;--cb-healthy:rgba(34,197,94,0.13);--cbr-healthy:rgba(34,197,94,0.3);
  --c-over:#3b82f6;--cb-over:rgba(59,130,246,0.13);--cbr-over:rgba(59,130,246,0.3);
  --c-dead:#4b5563;--cb-dead:rgba(75,85,99,0.1);--cbr-dead:rgba(75,85,99,0.25);
  --c-stock:#7c3aed;--cb-stock:rgba(124,58,237,0.13);--cbr-stock:rgba(124,58,237,0.3);
  --c-nodem:#6b7280;--cb-nodem:rgba(107,114,128,0.1);--cbr-nodem:rgba(107,114,128,0.25);
}
html{font-size:13px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* GRID BACKGROUND */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(56,189,248,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(56,189,248,0.025) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0
}

/* HEADER */
.hdr{
  position:sticky;top:0;z-index:200;
  background:rgba(8,11,16,0.9);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:12px 28px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  flex-wrap:wrap
}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-icon{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,#0ea5e9,#2563eb);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;box-shadow:0 0 24px rgba(14,165,233,0.35);
  flex-shrink:0
}
.hdr-title{font-size:16px;font-weight:800;letter-spacing:-0.03em;color:#e8f0fa}
.hdr-sub{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:10px}
.badge-live{
  display:flex;align-items:center;gap:5px;
  font-size:10px;color:#22c55e;font-family:'JetBrains Mono',monospace;
  padding:4px 9px;border-radius:20px;
  background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25)
}
.pulse{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.btn-refresh{
  background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.25);
  color:var(--accent);padding:6px 14px;border-radius:8px;
  cursor:pointer;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;
  transition:all 0.2s;letter-spacing:0.04em
}
.btn-refresh:hover{background:rgba(56,189,248,0.18);border-color:rgba(56,189,248,0.45)}
.timestamp{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}

/* MAIN */
.main{max-width:1500px;margin:0 auto;padding:22px 28px 50px;position:relative;z-index:1}

/* SUMMARY STRIP */
.summary-strip{
  display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px
}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:11px;padding:12px 16px;flex:1;min-width:100px;
  transition:border-color 0.2s;cursor:default
}
.stat-card:hover{border-color:var(--border2)}
.stat-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-bottom:4px}
.stat-val{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.stat-sub{font-size:9px;color:var(--text3);margin-top:3px}

/* CONTROLS */
.controls{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:12px 16px;margin-bottom:14px;
  display:flex;gap:10px;flex-wrap:wrap;align-items:center
}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
input.search{
  width:100%;background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:8px;
  color:var(--text);padding:8px 10px 8px 30px;font-size:12px;
  font-family:'Syne',sans-serif;outline:none;transition:border-color 0.2s
}
input.search:focus{border-color:rgba(56,189,248,0.4)}
input.search::placeholder{color:var(--text3)}
select.flt{
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:8px;color:var(--text);padding:8px 10px;font-size:12px;
  font-family:'Syne',sans-serif;outline:none;cursor:pointer;transition:border-color 0.2s
}
select.flt:focus{border-color:rgba(56,189,248,0.4)}
select.flt option{background:#0d1117}
.btn-sort{
  background:rgba(56,189,248,0.09);border:1px solid rgba(56,189,248,0.22);
  color:var(--accent);padding:8px 14px;border-radius:8px;
  cursor:pointer;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;
  white-space:nowrap;transition:all 0.2s;letter-spacing:0.03em
}
.btn-sort:hover{background:rgba(56,189,248,0.16)}
.count-info{font-size:11px;color:var(--text3);margin-left:auto;white-space:nowrap;font-family:'JetBrains Mono',monospace}
.btn-toggle{
  background:rgba(255,255,255,0.05);border:1px solid var(--border2);
  color:var(--text2);padding:7px 13px;border-radius:8px;
  cursor:pointer;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;
  white-space:nowrap;transition:all 0.2s;letter-spacing:0.03em;
  display:inline-flex;align-items:center;gap:5px
}
.btn-toggle.mode-kg{background:rgba(34,197,94,0.11);border-color:rgba(34,197,94,0.35);color:#22c55e}
.btn-toggle.mode-unit{background:rgba(56,189,248,0.11);border-color:rgba(56,189,248,0.35);color:var(--accent)}

/* LEGEND PILLS */
.legend{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.leg-pill{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
  cursor:pointer;font-size:10px;color:var(--text2);
  transition:all 0.15s;font-weight:600;user-select:none
}
.leg-pill:hover,.leg-pill.active{background:var(--pill-bg);border-color:var(--pill-br);color:var(--pill-c)}
.leg-num{font-family:'JetBrains Mono',monospace;font-size:10px;opacity:0.7}

/* TABLE */
.tbl-wrap{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
}
.tbl-head{
  display:grid;
  grid-template-columns: 2.6fr 90px 108px 1.1fr 96px 90px 78px 78px 102px;
  padding:9px 16px;
  background:rgba(255,255,255,0.025);
  border-bottom:1px solid var(--border);
  font-size:9px;font-weight:700;color:var(--text3);
  letter-spacing:0.08em;text-transform:uppercase
}
.tbl-row{
  display:grid;
  grid-template-columns: 2.6fr 90px 108px 1.1fr 96px 90px 78px 78px 102px;
  padding:11px 16px;
  border-bottom:1px solid rgba(255,255,255,0.03);
  border-left:3px solid var(--row-accent,transparent);
  cursor:pointer;
  transition:background 0.12s;
  align-items:center
}
.tbl-row:hover{background:rgba(255,255,255,0.035)}
.tbl-row.expanded{background:rgba(56,189,248,0.04)}
.tbl-row:last-child{border-bottom:none}

.cell-item-name{font-size:12px;font-weight:600;color:#dde3ee;line-height:1.3}
.cell-item-code{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.cell-group{font-size:10px;color:var(--text3);margin-top:1px}
.origin-badge{
  font-size:10px;padding:2px 7px;border-radius:5px;
  background:rgba(255,255,255,0.05);color:var(--text2);
  border:1px solid var(--border);display:inline-block;white-space:nowrap
}
.status-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:20px;
  font-size:10px;font-weight:700;white-space:nowrap;
  border:1px solid
}
.num{font-family:'JetBrains Mono',monospace;font-size:11px;text-align:right;color:var(--text)}
.num-dim{color:var(--text2)}
.num-r{text-align:right}

/* DOH BAR */
.doh-wrap{display:flex;align-items:center;gap:7px}
.doh-track{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.doh-fill{height:100%;border-radius:3px;transition:width 0.7s cubic-bezier(0.4,0,0.2,1)}
.doh-val{font-family:'JetBrains Mono',monospace;font-size:11px;min-width:40px;text-align:right;font-weight:600}

/* EXPANDED ROW */
.exp-row{
  border-left:3px solid var(--row-accent,transparent);
  background:rgba(56,189,248,0.03);
  border-bottom:1px solid rgba(255,255,255,0.04);
  padding:12px 18px 12px 34px;
  display:flex;gap:28px;flex-wrap:wrap;
  animation:slideDown 0.18s ease
}
@keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.exp-field{min-width:110px}
.exp-label{font-size:9px;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:3px;font-weight:600}
.exp-val{font-size:12px;font-family:'JetBrains Mono',monospace;color:#c2ccd8;font-weight:500}
.exp-val.hi{color:var(--accent);font-weight:700;font-size:13px}

/* EMPTY */
.empty{padding:50px;text-align:center;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:10px}

/* FOOTER */
.footer{
  margin-top:18px;display:flex;justify-content:space-between;
  align-items:center;flex-wrap:wrap;gap:6px
}
.footer-note{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}

/* APPS SCRIPT BANNER */
.as-banner{
  background:rgba(56,189,248,0.07);border:1px solid rgba(56,189,248,0.2);
  border-radius:10px;padding:10px 16px;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap
}
.as-banner input{
  flex:1;min-width:280px;background:rgba(255,255,255,0.06);
  border:1px solid rgba(56,189,248,0.25);border-radius:7px;
  color:#e8f0fa;padding:7px 10px;font-size:11px;
  font-family:'JetBrains Mono',monospace;outline:none
}
.as-banner input::placeholder{color:var(--text3)}
.as-banner .btn-connect{
  background:var(--accent);color:#080b10;border:none;
  padding:7px 16px;border-radius:7px;cursor:pointer;
  font-weight:800;font-size:11px;font-family:'Syne',sans-serif;
  letter-spacing:0.04em;transition:opacity 0.2s
}
.as-banner .btn-connect:hover{opacity:0.85}
.as-label{font-size:11px;color:var(--accent);font-weight:700}

@media(max-width:900px){
  .tbl-head,.tbl-row{grid-template-columns:2fr 70px 100px 1fr 80px 70px}
  .tbl-head > *:nth-child(7),.tbl-head > *:nth-child(8),.tbl-head > *:nth-child(9),
  .tbl-row > *:nth-child(7),.tbl-row > *:nth-child(8),.tbl-row > *:nth-child(9){display:none}
}
@media(max-width:600px){
  .main{padding:14px 12px 40px}
  .hdr{padding:10px 14px}
  .tbl-head,.tbl-row{grid-template-columns:1fr 90px 100px 1fr}
  .tbl-head > *:nth-child(n+3):not(:nth-child(3)):not(:nth-child(4)),
  .tbl-row > *:nth-child(n+3):not(:nth-child(3)):not(:nth-child(4)){display:none}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-icon">📦</div>
    <div>
      <div class="hdr-title">FG DOH Dashboard</div>
      <div class="hdr-sub">Finished Goods Days on Hand · Farmley</div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="badge-live"><span class="pulse"></span>LIVE</span>
    <span class="timestamp" id="ts">—</span>
    <button class="btn-refresh" onclick="fetchLive()">↺ Refresh</button>
  </div>
</header>

<main class="main">

  <!-- APPS SCRIPT URL CONNECTOR -->
  <div class="as-banner">
    <span class="as-label">🔗 Connect Google Sheet</span>
    <input type="text" id="asUrl" placeholder="Paste Apps Script Web App URL here…" />
    <button class="btn-connect" onclick="connectSheet()">Connect &amp; Fetch</button>
    <span id="connStatus" style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace"></span>
  </div>

  <!-- SUMMARY STRIP -->
  <div class="summary-strip" id="summaryStrip"></div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search" type="text" id="searchInput" placeholder="Search item name, code, group…" oninput="applyFilters()">
    </div>
    <select class="flt" id="originFlt" onchange="applyFilters()">
      <option value="">All Origins</option>
    </select>
    <select class="flt" id="groupFlt" onchange="applyFilters()">
      <option value="">All Groups</option>
    </select>
    <select class="flt" id="statusFlt" onchange="applyFilters()">
      <option value="">All Statuses</option>
    </select>
    <button class="btn-toggle mode-kg" id="unitToggle" onclick="toggleUnit()" title="Toggle between KG and Units mode">📦 KG Mode</button>
    <button class="btn-sort" id="sortBtn" onclick="toggleSort()">↑ Critical First</button>
    <span class="count-info" id="countInfo">0 items</span>
  </div>

  <!-- LEGEND -->
  <div class="legend" id="legend"></div>

  <!-- TABLE -->
  <div class="tbl-wrap">
    <div class="tbl-head" id="tblHead">
      <div>Item</div>
      <div>Origin</div>
      <div>Status</div>
      <div>DOH</div>
      <div class="num-r" id="hdrInhand">Inhand KG</div>
      <div class="num-r" id="hdrDemand">Avg Demand</div>
      <div class="num-r" id="hdrSoQty">SO KG</div>
      <div class="num-r">SO Days</div>
      <div class="num-r">Value ₹</div>
    </div>
    <div id="tableBody"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-note" id="footerNote">FG DOH = Inhand KG ÷ (Total SO KG ÷ Unique SO Days) · Perishable shelf life 8 months</span>
    <span class="footer-note" id="dataNote"></span>
  </div>

</main>

let allData = [...EMBEDDED_DATA];
let filtered = [...allData];
let sortDir    = 'asc';
let unitMode   = 'kg'; // 'kg' | 'unit'
let expandedIdx = null;
let activeLegend = null;
let appsScriptUrl = localStorage.getItem('fg_doh_url') || 'https://script.google.com/macros/s/AKfycbwi4EEYNFN1yk7C1GMm0-DkmwmOZwh2YeLSUSv0pPMtW2Dn0Mmv7VOWP-BXEGpkxmexZA/exec'; 

if(appsScriptUrl) document.getElementById('asUrl').value = appsScriptUrl;

function fmt(n, d=1){
  if(n==null||n===undefined||isNaN(n)) return '—';
  return Number(n).toLocaleString('en-IN',{maximumFractionDigits:d});
}
function fmtCur(n){
  if(!n) return '—';
  if(n>=10000000) return '₹'+(n/10000000).toFixed(1)+'Cr';
  if(n>=100000) return '₹'+(n/100000).toFixed(1)+'L';
  return '₹'+fmt(n,0);
}
function getDohColor(s){
  return (STATUS_CFG[s]||STATUS_CFG['Dead Stock']).c;
}

function buildFilters(){
  const origins = [...new Set(allData.map(r=>r.origin))].sort();
  const groups  = [...new Set(allData.map(r=>r.itemGroup).filter(Boolean))].sort();
  const statuses= Object.keys(STATUS_CFG);
  const oFlt=document.getElementById('originFlt');
  const gFlt=document.getElementById('groupFlt');
  const sFlt=document.getElementById('statusFlt');
  origins.forEach(o=>{const op=document.createElement('option');op.value=o;op.textContent=o;oFlt.appendChild(op)});
  groups.forEach(g=>{const op=document.createElement('option');op.value=g;op.textContent=g;gFlt.appendChild(op)});
  statuses.forEach(s=>{const op=document.createElement('option');op.value=s;op.textContent=STATUS_CFG[s].e+' '+s;sFlt.appendChild(op)});
}

function buildLegend(){
  const counts={};
  allData.forEach(r=>{counts[r.status]=(counts[r.status]||0)+1});
  const leg=document.getElementById('legend');
  leg.innerHTML='';
  Object.entries(STATUS_CFG).forEach(([k,v])=>{
    if(!counts[k]) return;
    const p=document.createElement('div');
    p.className='leg-pill'+(activeLegend===k?' active':'');
    p.style.setProperty('--pill-bg',v.bg);
    p.style.setProperty('--pill-br',v.br);
    p.style.setProperty('--pill-c',v.c);
    p.innerHTML=`${v.e} ${k} <span class="leg-num">${counts[k]}</span>`;
    p.onclick=()=>{
      activeLegend = activeLegend===k ? null : k;
      document.getElementById('statusFlt').value = activeLegend||'';
      buildLegend();
      applyFilters();
    };
    leg.appendChild(p);
  });
}

function buildSummary(){
  const counts={};
  allData.forEach(r=>{
    const s = (unitMode==='unit' && r.statusUnits) ? r.statusUnits : r.status;
    counts[s]=(counts[s]||0)+1;
  });
  const modeLabel = unitMode==='unit' ? 'units' : 'in inhand';
  const cards=[
    {l:'Total Items',v:allData.length,s:modeLabel,c:'#dde3ee'},
    {l:'Critical',v:counts['Critical']||0,s:'DOH ≤3d',c:'#ef4444'},
    {l:'Stockout',v:counts['Stockout']||0,s:'0 inventory',c:'#dc2626'},
    {l:'Low',v:counts['Low']||0,s:'DOH 4–7d',c:'#f97316'},
    {l:'Watch',v:counts['Watch']||0,s:'DOH 8–15d',c:'#eab308'},
    {l:'Healthy',v:counts['Healthy']||0,s:'DOH 16–30d',c:'#22c55e'},
    {l:'Overstocked',v:counts['Overstocked']||0,s:'DOH > 30d',c:'#3b82f6'},
    {l:'No Signal',v:(counts['Dead Stock']||0)+(counts['No Recent Demand']||0),s:'no demand',c:'#4b5563'},
  ];
  document.getElementById('summaryStrip').innerHTML=cards.map(c=>`
    <div class="stat-card">
      <div class="stat-label">${c.l}</div>
      <div class="stat-val" style="color:${c.c}">${c.v}</div>
      <div class="stat-sub">${c.s}</div>
    </div>`).join('');
}

function applyFilters(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const origin = document.getElementById('originFlt').value;
  const group  = document.getElementById('groupFlt').value;
  const status = document.getElementById('statusFlt').value;
  activeLegend = status || null;
  buildLegend();

  filtered = allData.filter(r=>{
    if(origin && r.origin!==origin) return false;
    if(group  && r.itemGroup!==group) return false;
    if(status && r.status!==status) return false;
    if(q && !r.itemName.toLowerCase().includes(q) &&
           !r.itemCode.toLowerCase().includes(q) &&
           !r.itemGroup.toLowerCase().includes(q)) return false;
    return true;
  });

  sortData();
  expandedIdx = null;
  renderTable();
  document.getElementById('countInfo').textContent=`${filtered.length} of ${allData.length} items`;
}

function sortData(){
  filtered.sort((a,b)=>{
    const an=a.fgDoh===null, bn=b.fgDoh===null;
    if(an&&bn) return 0;
    if(an) return sortDir==='asc'?1:-1;
    if(bn) return sortDir==='asc'?-1:1;
    return sortDir==='asc' ? a.fgDoh-b.fgDoh : b.fgDoh-a.fgDoh;
  });
}

function toggleSort(){
  sortDir = sortDir==='asc' ? 'desc' : 'asc';
  document.getElementById('sortBtn').textContent = sortDir==='asc' ? '↑ Critical First' : '↓ Healthy First';
  sortData();
  expandedIdx=null;
  renderTable();
}

function toggleUnit(){
  unitMode = unitMode==='kg' ? 'unit' : 'kg';
  const btn = document.getElementById('unitToggle');
  if(unitMode==='kg'){
    btn.textContent='📦 KG Mode';
    btn.className='btn-toggle mode-kg';
  } else {
    btn.textContent='🔢 Units Mode';
    btn.className='btn-toggle mode-unit';
  }
  updateTableHeader();
  updateFooter();
  buildSummary();
  expandedIdx=null;
  renderTable();
}

function updateTableHeader(){
  if(unitMode==='kg'){
    document.getElementById('hdrInhand').textContent='Inhand KG';
    document.getElementById('hdrDemand').textContent='Avg Demand';
    document.getElementById('hdrSoQty').textContent='SO KG';
  } else {
    document.getElementById('hdrInhand').textContent='Inhand UNT';
    document.getElementById('hdrDemand').textContent='Avg Demand';
    document.getElementById('hdrSoQty').textContent='SO UNT';
  }
}

function updateFooter(){
  const note = document.getElementById('footerNote');
  if(unitMode==='kg'){
    note.textContent='FG DOH = Inhand KG ÷ (Total SO KG ÷ Unique SO Days) · Perishable shelf life 8 months';
  } else {
    note.textContent='FG DOH = Inhand Units ÷ (Total SO Units ÷ Unique SO Days) · Switch to KG Mode for KG-based analysis';
  }
}

function effVal(r){
  // Returns the display-mode-aware fields for a row
  const useUnit = unitMode==='unit' && r.statusUnits;
  return {
    status:    useUnit ? r.statusUnits       : r.status,
    doh:       useUnit ? r.fgDohUnits        : r.fgDoh,
    inhand:    useUnit ? r.inhandUnits       : r.inhandQty,
    demand:    useUnit ? r.avgDailyDemandUnits : r.avgDailyDemand,
    soQty:     useUnit ? r.totalSoQtyUnits   : r.totalSoQty,
    unit:      useUnit ? 'UNT' : 'KG'
  };
}

function renderTable(){
  const body = document.getElementById('tableBody');
  if(!filtered.length){
    body.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div>No items match your filters</div></div>`;
    return;
  }
  const MAX_DOH=45;
  body.innerHTML = filtered.map((r,i)=>{
    const ev  = effVal(r);
    const cfg = STATUS_CFG[ev.status]||STATUS_CFG['Dead Stock'];
    const pct = ev.doh===null ? 0 : Math.min(ev.doh/MAX_DOH*100,100);
    const col = cfg.c;
    const dohLabel = ev.doh===null ? '—' : ev.doh+'d';
    const expanded = expandedIdx===i;

    const rowHtml=`<div class="tbl-row${expanded?' expanded':''}" 
      style="--row-accent:${col}" 
      onclick="toggleExpand(${i})"
      data-i="${i}">
      <div>
        <div class="cell-item-name">${esc(r.itemName)}</div>
        <div class="cell-item-code">${esc(r.itemCode)}</div>
        ${r.itemGroup?`<div class="cell-group">${esc(r.itemGroup)}</div>`:''}
      </div>
      <div><span class="origin-badge">${esc(r.origin)}</span></div>
      <div><span class="status-badge" style="background:${cfg.bg};border-color:${cfg.br};color:${col}">${cfg.e} ${ev.status}</span></div>
      <div class="doh-wrap">
        <div class="doh-track"><div class="doh-fill" style="width:${pct}%;background:${col}"></div></div>
        <span class="doh-val" style="color:${col}">${dohLabel}</span>
      </div>
      <div class="num num-dim">${fmt(ev.inhand)}</div>
      <div class="num num-dim">${fmt(ev.demand,2)}<span style="font-size:9px;color:var(--text3)">/${ev.unit}/d</span></div>
      <div class="num num-dim">${fmt(ev.soQty)}</div>
      <div class="num num-dim">${r.uniqueDays||'—'}</div>
      <div class="num num-dim">${fmtCur(r.value)}</div>
    </div>`;

    const expHtml = expanded ? `<div class="exp-row" style="--row-accent:${col}">
      <div class="exp-field"><div class="exp-label">FG DOH (${ev.unit})</div><div class="exp-val hi">${ev.doh!==null?ev.doh+' days':'—'}</div></div>
      <div class="exp-field"><div class="exp-label">Inhand KG</div><div class="exp-val">${fmt(r.inhandQty)}</div></div>
      <div class="exp-field"><div class="exp-label">Inhand Units</div><div class="exp-val">${r.inhandUnits!=null?fmt(r.inhandUnits):'—'}</div></div>
      <div class="exp-field"><div class="exp-label">Avg Demand KG/d</div><div class="exp-val">${fmt(r.avgDailyDemand,2)}</div></div>
      <div class="exp-field"><div class="exp-label">Avg Demand UNT/d</div><div class="exp-val">${r.avgDailyDemandUnits!=null?fmt(r.avgDailyDemandUnits,2):'—'}</div></div>
      <div class="exp-field"><div class="exp-label">Total SO KG</div><div class="exp-val">${fmt(r.totalSoQty)}</div></div>
      <div class="exp-field"><div class="exp-label">Total SO UNT</div><div class="exp-val">${r.totalSoQtyUnits!=null?fmt(r.totalSoQtyUnits):'—'}</div></div>
      <div class="exp-field"><div class="exp-label">Unique SO Days</div><div class="exp-val">${r.uniqueDays||'—'}</div></div>
      <div class="exp-field"><div class="exp-label">Stock Age</div><div class="exp-val">${fmt(r.age)} days</div></div>
      <div class="exp-field"><div class="exp-label">Inventory Value</div><div class="exp-val">${fmtCur(r.value)}</div></div>
      <div class="exp-field"><div class="exp-label">Recent Demand (30d)</div><div class="exp-val">${r.hasRecentDemand?'✅ Yes':'❌ No'}</div></div>
      <div class="exp-field" style="max-width:220px"><div class="exp-label">Warehouse</div><div class="exp-val" style="font-size:10px;line-height:1.4">${esc(r.warehouse||'—')}</div></div>
    </div>` : '';

    return rowHtml+expHtml;
  }).join('');
}

function toggleExpand(i){
  expandedIdx = expandedIdx===i ? null : i;
  renderTable();
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setTimestamp(){
  const now = new Date();
  document.getElementById('ts').textContent = now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('dataNote').textContent = 'Data as of '+now.toLocaleString('en-IN');
}

async function fetchLive(){
  const url = document.getElementById('asUrl').value.trim() || appsScriptUrl;
  if(!url){
    document.getElementById('connStatus').textContent='⚠ No URL set — showing embedded data';
    return;
  }
  document.getElementById('connStatus').textContent='⟳ Fetching…';
  try{
    const res = await fetch(url+'?action=getData');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    if(json.error) throw new Error(json.error);
    allData = json.data || [];
    document.getElementById('connStatus').textContent=`✓ Live · ${allData.length} items`;
    reload();
  } catch(e){
    document.getElementById('connStatus').textContent='✗ '+e.message+' (showing embedded data)';
    allData = [...EMBEDDED_DATA];
    reload();
  }
}

function connectSheet(){
  appsScriptUrl = document.getElementById('asUrl').value.trim();
  if(appsScriptUrl) localStorage.setItem('fg_doh_url', appsScriptUrl);
  fetchLive();
}

function reload(){
  filtered=[...allData];
  sortData();
  expandedIdx=null;
  buildSummary();
  buildLegend();
  renderTable();
  setTimestamp();
  document.getElementById('countInfo').textContent=`${filtered.length} of ${allData.length} items`;
}

// INIT
buildFilters();
reload();

// Auto-refresh every 5 min if URL set
setInterval(()=>{ if(appsScriptUrl) fetchLive(); }, 5*60*1000);
</script>
</body>
</html>
